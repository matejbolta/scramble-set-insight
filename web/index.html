<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scramble Set Insight</title>
    <meta
      name="description"
      content="Analyze scramble-set luck with a static browser app powered by the JavaScript port of the core engine."
    />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="app-shell">
        <section class="parameter-grid">
          <div class="parameter-group">
            <label class="field-label">Edge tracing</label>
            <div class="radio-group" id="edge-method-group">
              <label class="radio-option">
                <input type="radio" name="edge-method" value="weakswap" checked />
                <span>Weak Swap</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="edge-method" value="pseudoswap" />
                <span>Pseudo Swap</span>
              </label>
            </div>

            <label class="field-label" for="tracing-orientation">Tracing orientation</label>
            <input id="tracing-orientation" class="text-input" type="text" placeholder="e.g. x2" />
          </div>

          <div class="parameter-group">
            <label class="checkbox-option">
              <input id="dnf" type="checkbox" />
              <span>Include DNFs</span>
            </label>
            <label class="checkbox-option">
              <input id="ltct" type="checkbox" />
              <span>I use LTCT</span>
            </label>

            <div class="weight-grid">
              <label class="field-label field-label--compact" for="flip-weight" title="Algs per floating 2-flip">2-flip weight</label>
              <label class="field-label field-label--compact" for="twist-weight" title="Algs per floating 2-twist">2-twist weight</label>
              <input id="flip-weight" class="number-input" type="number" min="0" step="0.5" value="1" />
              <input id="twist-weight" class="number-input" type="number" min="0" step="0.5" value="1" />
            </div>
          </div>

          <div class="parameter-group">
            <label class="field-label">Buffers</label>
            <div class="radio-group" id="buffer-mode-group">
              <label class="radio-option">
                <input type="radio" name="buffer-mode" value="standard" checked />
                <span>UF/UFR</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="buffer-mode" value="full" />
                <span>Full floating</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="buffer-mode" value="partial" />
                <span>Partial floating</span>
              </label>
            </div>

            <div class="partial-buffers is-hidden" id="partial-buffers">
              <div class="buffer-subgroup">
                <div class="buffer-subtitle">Corner buffers</div>
                <div class="pill-grid" id="corner-pills"></div>
              </div>
              <div class="buffer-subgroup">
                <div class="buffer-subtitle">Edge buffers</div>
                <div class="pill-grid" id="edge-pills"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="scramble-section">
          <label class="field-label" for="scramble-input">Scrambles</label>
          <textarea
            id="scramble-input"
            class="scramble-textarea"
            placeholder="Paste from csTimer's ScrambleGenerator or Session Statistics"
          ></textarea>
        </section>

        <section class="action-row">
          <button class="secondary-button" id="load-example-button" type="button">Load 10k Example</button>
          <button class="secondary-button" id="clear-button" type="button">Clear</button>
          <button class="primary-button" id="analyze-button" type="button">Analyze Set</button>
        </section>

        <section class="results-section is-hidden" id="results-section">
          <div class="notice-banner" id="processed-banner"></div>

          <div class="metric-grid">
            <article class="metric-card">
              <span class="metric-label">Scrambles</span>
              <strong class="metric-value" id="stat-solves">0</strong>
            </article>
            <article class="metric-card">
              <span class="metric-label">Total algs</span>
              <strong class="metric-value" id="stat-total">0</strong>
            </article>
            <article class="metric-card">
              <span class="metric-label">Average algs</span>
              <strong class="metric-value" id="stat-average">0.00</strong>
            </article>
            <article class="metric-card">
              <span class="metric-label">F-2-flips</span>
              <strong class="metric-value" id="stat-two-flips">0</strong>
            </article>
            <article class="metric-card">
              <span class="metric-label">F-2-twists</span>
              <strong class="metric-value" id="stat-two-twists">0</strong>
            </article>
          </div>

          <div class="divider"></div>

          <section class="result-block">
            <h2>Distribution</h2>
            <div id="distribution-chart" class="distribution-chart empty-state">Run an analysis to see the distribution.</div>
          </section>

          <section class="result-block">
            <h2>Algs per scramble</h2>
            <div id="alg-grid" class="alg-grid empty-state">Run an analysis to see per-scramble alg counts.</div>
          </section>
        </section>
      </main>
    </div>

    <script src="./wide-move-translator.js"></script>
    <script src="./scrambling.js"></script>
    <script src="./corner-tracing.js"></script>
    <script src="./edge-common.js"></script>
    <script src="./weakswap-tracing.js"></script>
    <script src="./pseudoswap-tracing.js"></script>
    <script src="./finalizing.js"></script>
    <script src="./ssi-core.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
